name: package-linux-macos

on:
  workflow_dispatch:
    inputs:
      build_env:
        description: Build environment
        required: true
        default: stable
        type: choice
        options:
          - stable
          - pre
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-linux-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      PUB_HOSTED_URL: https://pub.dev
      FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
            arch: amd64
          - platform: macos
            os: macos-13
            arch: amd64
          - platform: macos
            os: macos-14
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: startsWith(matrix.platform, 'macos')
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache: true
          cache-dependency-path: core/Clash.Meta/go.sum

      - name: Install Linux Linker And Build Deps
        if: matrix.platform == 'linux'
        run: |
          set -euxo pipefail
          sudo apt-get update -y
          sudo apt-get install -y lld-18 clang-18 llvm-18
          ls -l /usr/lib/llvm-18/bin/ld.lld

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - name: Git Network Compatibility
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

      - name: Create CI Pub Overrides
        run: |
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            flutter_js: 0.8.3
            re_editor: 0.7.0
          EOF
          cat pubspec_overrides.yaml

      - name: Flutter Pub Get
        run: |
          set -euxo pipefail
          flutter --version
          for i in 1 2 3; do
            if flutter pub get; then
              exit 0
            fi
            echo "flutter pub get failed (attempt $i), retrying..."
            sleep $((i * 10))
          done
          echo "flutter pub get failed after retries, running verbose output..."
          flutter pub get -v
          exit 1

      - name: SDK Pub Get
        run: |
          cd lib/sdk/flutter_xboard_sdk
          flutter pub get

      - name: Generate SDK Code
        run: |
          cd lib/sdk/flutter_xboard_sdk
          dart run build_runner build --delete-conflicting-outputs

      - name: Generate Main Project Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Toolchain Debug
        run: |
          set -euxo pipefail
          uname -a || true
          flutter --version
          dart --version
          go version

      - name: Package
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_ENV="${{ github.event.inputs.build_env }}"
          else
            if [[ "${{ github.ref_name }}" == *-* ]]; then
              BUILD_ENV="pre"
            else
              BUILD_ENV="stable"
            fi
          fi
          echo "build env: $BUILD_ENV"
          dart run setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} --out app --env "$BUILD_ENV"

      - name: List Dist Files
        run: |
          echo "dist files:"
          ls -lah dist || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/**
          if-no-files-found: error
          overwrite: true
