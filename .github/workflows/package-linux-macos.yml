name: package-linux-macos

on:
  workflow_dispatch:
    inputs:
      build_env:
        description: Build environment
        required: true
        default: stable
        type: choice
        options:
          - stable
          - pre
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-linux-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      PUB_HOSTED_URL: https://pub.dev
      FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: macos
            os: macos-15-intel
            arch: amd64
          - platform: macos
            os: macos-15
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        if: startsWith(matrix.platform, 'macos')
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20.x"
          cache: true
          cache-dependency-path: core/Clash.Meta/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3
          cache: true

      - name: Git Network Compatibility
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

      - name: Prepare CI Git Dependencies
        run: |
          set -euxo pipefail
          mkdir -p .ci_deps

          retry_clone() {
            local url="$1"
            local dir="$2"
            local ref="$3"
            rm -rf "$dir"
            for i in 1 2 3; do
              if git clone --filter=blob:none --depth 1 "$url" "$dir"; then
                git -C "$dir" fetch --depth 1 origin "$ref" || true
                git -C "$dir" checkout "$ref"
                return 0
              fi
              echo "clone failed ($url), retry $i"
              sleep $((i * 8))
            done
            return 1
          }

          retry_clone "https://github.com/chen08209/flutter_js" ".ci_deps/flutter_js" "c0e10a5dab0e22cd616ec92ae71471d76369cbfe"
          retry_clone "https://github.com/chen08209/re-editor.git" ".ci_deps/re_editor" "7cda330fc33d5ef9e00333048b70ce65a5f5d550"

      - name: Create CI Pub Overrides
        run: |
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            flutter_js:
              path: .ci_deps/flutter_js
            re_editor:
              path: .ci_deps/re_editor
          EOF
          cat pubspec_overrides.yaml

      - name: Flutter Pub Get
        run: |
          set -euxo pipefail
          flutter --version
          for i in 1 2 3; do
            if flutter pub get; then
              exit 0
            fi
            echo "flutter pub get failed (attempt $i), retrying..."
            sleep $((i * 10))
          done
          echo "flutter pub get failed after retries, running verbose output..."
          flutter pub get -v
          exit 1

      - name: SDK Pub Get
        run: |
          cd lib/sdk/flutter_xboard_sdk
          flutter pub get

      - name: Generate SDK Code
        run: |
          cd lib/sdk/flutter_xboard_sdk
          dart run build_runner build --delete-conflicting-outputs

      - name: Generate Main Project Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Toolchain Debug
        run: |
          set -euxo pipefail
          uname -a || true
          flutter --version
          dart --version
          go version

      - name: Package
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_ENV="${{ github.event.inputs.build_env }}"
          else
            if [[ "${{ github.ref_name }}" == *-* ]]; then
              BUILD_ENV="pre"
            else
              BUILD_ENV="stable"
            fi
          fi
          echo "build env: $BUILD_ENV"
          dart run setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} --out app --env "$BUILD_ENV"

      - name: List Dist Files
        run: |
          echo "dist files:"
          ls -lah dist || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/**
          if-no-files-found: error
          overwrite: true
